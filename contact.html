<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Naveli</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #fff5f8;
}

/* ===== NAVBAR ===== */
.navbar {
  background: linear-gradient(to right, #ff4d88, #d63384);
  padding: 12px 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.logo {
  height: 50px;
  transform: scale(1.15);
}

/* ===== CONTACT ===== */
.contact-box {
  background: white;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

.form-control {
  border-radius: 12px;
  padding: 12px;
  border: 1px solid #eee;
}

.form-control:focus {
  box-shadow: none;
  border-color: #d63384;
}

/* BUTTON */
.btn-custom {
  background: linear-gradient(to right, #ff4d88, #d63384);
  color: white;
  border-radius: 25px;
  padding: 12px;
  width: 100%;
  transition: 0.3s;
}

.btn-custom:hover {
  transform: scale(1.03);
}

/* WHATSAPP */
.whatsapp-btn {
  border-radius: 25px;
  padding: 10px 20px;
}

/* ===== SECTIONS ===== */
section {
  padding: 70px 0;
}

/* WHY */
.why-section {
  background: #fff;
}

.feature-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  margin: 10px;
  transition: 0.3s;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.feature-box:hover {
  transform: translateY(-10px);
}

/* ABOUT */
.about-text {
  max-width: 600px;
  margin: auto;
  color: #555;
  line-height: 1.6;
}

/* FOOTER */
footer {
  background: #222;
  color: white;
  padding: 25px;
  text-align: center;
}
</style>

</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <img src="./images/logo1.jpeg" class="logo" alt="Naveli Logo">
    </a>
  </div>
</nav>

<!-- ===== CONTACT ===== -->
<div class="container mt-5 pt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="contact-box">
        <h2 class="text-center mb-4 fw-bold">Get in Touch</h2>

        <form>
          <input type="text" class="form-control mb-3" placeholder="Your Name" required>
          <input type="email" class="form-control mb-3" placeholder="Your Email" required>
          <textarea class="form-control mb-3" rows="4" placeholder="Your Message" required></textarea>

          <button class="btn btn-custom">Send Message</button>
        </form>

        <!-- WhatsApp -->
        <div class="text-center mt-4">
          <a href="https://wa.me/91XXXXXXXXXX" class="btn btn-success whatsapp-btn">
            Chat on WhatsApp
          </a>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- ===== WHY ===== -->
<section class="why-section text-center">
  <div class="container">
    <h2 class="fw-bold mb-4">Why Choose Naveli</h2>

    <div class="row">
      <div class="col-md-3 col-6"><div class="feature-box">Premium Fabric</div></div>
      <div class="col-md-3 col-6"><div class="feature-box">Trendy Designs</div></div>
      <div class="col-md-3 col-6"><div class="feature-box">Affordable Prices</div></div>
      <div class="col-md-3 col-6"><div class="feature-box">Comfort Fit</div></div>
    </div>
  </div>
</section>

<!-- ===== ABOUT ===== -->
<section id="about" class="text-center">
  <div class="container">
    <h2 class="fw-bold mb-3">About Naveli</h2>
    <p class="about-text">
      Naveli blends tradition with modern style. We create comfortable,
      stylish and elegant kurtis for everyday wear.
    </p>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <p>© 2026 Naveli | All Rights Reserved</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
